<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="heatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <radialGradient id="hotspot1" cx="35%" cy="50%" r="25%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="hotspot2" cx="65%" cy="40%" r="20%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" rx="12" ry="12" fill="url(#heatGrad)"/>
  <rect width="800" height="400" rx="12" ry="12" fill="url(#hotspot1)"/>
  <rect width="800" height="400" rx="12" ry="12" fill="url(#hotspot2)"/>
  <text x="400" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="white">Heatmap Analysis</text>
